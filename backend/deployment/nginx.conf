# =============================================================================
# NGINX Configuration for Digital Profile Hub
# =============================================================================
# File: /etc/nginx/sites-available/digital-profile-hub
# 
# DEPLOYMENT INSTRUCTIONS:
# 1. Copy this file to /etc/nginx/sites-available/digital-profile-hub
# 2. Create symlink: sudo ln -s /etc/nginx/sites-available/digital-profile-hub /etc/nginx/sites-enabled/
# 3. Test config: sudo nginx -t
# 4. Reload nginx: sudo systemctl reload nginx
# 5. Obtain SSL: sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
# =============================================================================

# -----------------------------------------------------------------------------
# Rate Limiting Zones
# -----------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=profile_api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=profile_upload_limit:10m rate=2r/s;

# -----------------------------------------------------------------------------
# Upstream Configuration
# -----------------------------------------------------------------------------
# Backend running on port 3003 (3001=rasheqa, 3002=fitness-funnel, 3003=profile-hub)
upstream profile_hub_backend {
    server 127.0.0.1:3003;
    keepalive 64;
}

# -----------------------------------------------------------------------------
# HTTP Server Block (TEMPORARY - for SSL certificate setup)
# -----------------------------------------------------------------------------
# After obtaining SSL certificate, this will redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Let's Encrypt challenge location (for SSL certificate)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect all other HTTP traffic to HTTPS (uncomment after SSL setup)
    # return 301 https://$server_name$request_uri;
}

