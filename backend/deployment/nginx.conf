# =============================================================================
# NGINX Configuration for Digital Profile Hub
# =============================================================================
# File: /etc/nginx/sites-available/digital-profile-hub
# 
# DEPLOYMENT INSTRUCTIONS:
# 1. Copy this file to /etc/nginx/sites-available/digital-profile-hub
# 2. Create symlink: sudo ln -s /etc/nginx/sites-available/digital-profile-hub /etc/nginx/sites-enabled/
# 3. Test config: sudo nginx -t
# 4. Reload nginx: sudo systemctl reload nginx
# 
# PORT ALLOCATION:
# - 8080/8443: Fitness Funnel
# - 9080/9443: Profile Hub (this app)
# - Backend: localhost:3003
# =============================================================================

# -----------------------------------------------------------------------------
# Rate Limiting Zones
# -----------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=profile_api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=profile_upload_limit:10m rate=2r/s;

# -----------------------------------------------------------------------------
# Upstream Configuration
# -----------------------------------------------------------------------------
upstream profile_hub_backend {
    server 127.0.0.1:3003;
    keepalive 64;
}

# -----------------------------------------------------------------------------
# HTTP Server - Redirect to HTTPS
# -----------------------------------------------------------------------------
server {
    listen 9080;
    listen [::]:9080;
    server_name 91.108.113.135;
    
    return 301 https://$server_name:9443$request_uri;
}

# -----------------------------------------------------------------------------
# HTTPS Server
# -----------------------------------------------------------------------------
server {
    listen 9443 ssl http2;
    listen [::]:9443 ssl http2;
    server_name 91.108.113.135;
    
    # SSL Configuration (use self-signed cert like fitness-funnel)
    ssl_certificate /etc/nginx/ssl/profile-hub.crt;
    ssl_certificate_key /etc/nginx/ssl/profile-hub.key;
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:ProfileSSL:10m;
    ssl_session_timeout 10m;
    
    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Logging
    access_log /var/log/nginx/profile-hub-access.log;
    error_log /var/log/nginx/profile-hub-error.log;
    
    # Client body settings
    client_max_body_size 10M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    client_body_buffer_size 128k;
    send_timeout 60s;
    
    # Root directory for frontend static files
    root /var/www/GoldenTag/frontend/dist;
    index index.html;
    
    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        font/woff
        font/woff2
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;
    
    # Health Check Endpoint (specific, comes first)
    location = /api/health {
        proxy_pass http://profile_hub_backend;
        access_log off;
    }
    
    # Uploaded Files (avatars, backgrounds, PDFs)
    location /uploads/ {
        alias /var/www/GoldenTag/backend/uploads/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;
        access_log off;
        
        # Optimize for file serving
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
    }
    
    # File Upload Endpoints - Stricter Rate Limiting
    location ~ ^/api/(files|profiles/me/avatar|profiles/me/background) {
        limit_req zone=profile_upload_limit burst=5 nodelay;
        
        proxy_pass http://profile_hub_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Extended timeouts for uploads
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        
        # Don't modify the request
        proxy_pass_request_headers on;
        proxy_pass_request_body on;
    }
    
    # API Routes - General
    location /api/ {
        limit_req zone=profile_api_limit burst=20 nodelay;
        
        proxy_pass http://profile_hub_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_cache_bypass $http_upgrade;
        
        # Standard timeouts
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }
    
    # Frontend Static Assets - Aggressive Caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Frontend - SPA Routing (catch-all, comes last)
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # Block Sensitive Files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ^/(\.env|package\.json|package-lock\.json|tsconfig\.json|prisma)/ {
        deny all;
    }
    
    location ~* \.(bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist)$ {
        deny all;
    }
}
